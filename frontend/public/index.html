<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0f172a" />
        <meta name="description" content="Pediatric Emergency Reference — Weight-based drug doses, resuscitation protocols, and clinical tools for emergency physicians. Based on Fleischer & Ludwig, Harriet Lane & IAP Guidelines." />

        <!-- PWA: Makes app installable on mobile (Add to Home Screen) -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="PedResus" />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />

        <!-- SEO / Social sharing -->
        <meta property="og:title" content="PedResus — Pediatric Emergency Reference" />
        <meta property="og:description" content="Weight-based drug doses & clinical protocols for ED physicians. Based on Harriet Lane, Fleischer & Ludwig, IAP Guidelines." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://ped-resus.netlify.app" />

        <title>PedResus — Pediatric Emergency Reference</title>

        <!-- Suppress non-critical errors from Emergent build -->
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    </body>
</html>
